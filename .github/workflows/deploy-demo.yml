name: Deploy Demo

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-demo:
    name: Refresh and Deploy Demo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 7e626eb7290ac1a1051857e1220709f2
      DEMO_DEPLOY_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing repository secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Refresh demo database (drop + recreate for clean schema)
        run: |
          npx wrangler d1 execute shuttle-arena-demo-db --remote --command "DROP TABLE IF EXISTS score_events; DROP TABLE IF EXISTS referee_records; DROP TABLE IF EXISTS match_games; DROP TABLE IF EXISTS matches; DROP TABLE IF EXISTS template_matches; DROP TABLE IF EXISTS template_positions; DROP TABLE IF EXISTS tournament_participants; DROP TABLE IF EXISTS players; DROP TABLE IF EXISTS groups; DROP TABLE IF EXISTS tournaments; DROP TABLE IF EXISTS users;"
          npm run d1:init:demo
          npm run d1:seed:demo

      - name: Deploy demo site
        run: npm run deploy:demo
